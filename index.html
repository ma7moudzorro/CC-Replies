/* ============================================================
   STATE & RENDER
============================================================ */
let activeGroupId = GROUPS[0].id;
let activeFilterId = GROUPS[0].filters?.[0]?.id || "all";
let query = "";

const tabsEl = document.getElementById("tabs");
const subtabsEl = document.getElementById("subtabs");
const gridEl = document.getElementById("grid");
const emptyEl = document.getElementById("empty");
const groupTitleEl = document.getElementById("groupTitle");
const groupDescEl = document.getElementById("groupDesc");
const searchInput = document.getElementById("searchInput");
const resultCountEl = document.getElementById("resultCount");

function getActiveGroup() {
  return GROUPS.find(g => g.id === activeGroupId) || GROUPS[0];
}

function visibleItemsFor(group) {
  const q = query.trim().toLowerCase();
  return group.items.filter(item => {
    const filterOk = !group.filters || activeFilterId === "all" || item.filter === activeFilterId;
    return filterOk && matchesQuery(item, q);
  });
}

function renderTabs() {
  tabsEl.innerHTML = "";
  GROUPS.forEach(g => {
    const isActive = g.id === activeGroupId;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = [
      "inline-flex items-center gap-2 rounded-full border px-4 py-2 text-sm font-medium transition-all focus:outline-none focus:ring-2 focus:ring-brand-500/30",
      isActive
        ? "bg-brand-600 border-brand-600 text-white shadow-card"
        : "bg-white border-ink-300 text-ink-700 hover:border-brand-500 hover:text-ink-900"
    ].join(" ");
    btn.innerHTML = `
      <span>${escapeHtml(g.title)}</span>
      <span class="rounded-full px-1.5 text-xs ${isActive ? 'bg-white/20 text-white' : 'bg-ink-100 text-ink-500'}">${g.items.length}</span>
    `;
    btn.addEventListener("click", () => {
      activeGroupId = g.id;
      activeFilterId = g.filters?.[0]?.id || "all";
      query = "";
      searchInput.value = "";
      renderAll();
    });
    tabsEl.appendChild(btn);
  });
}

function renderSubtabs() {
  const group = getActiveGroup();
  subtabsEl.innerHTML = "";
  if (!group.filters) {
    subtabsEl.classList.add("hidden");
    subtabsEl.classList.remove("flex");
    return;
  }
  subtabsEl.classList.remove("hidden");
  subtabsEl.classList.add("flex");
  group.filters.forEach(filter => {
    const count = group.items.filter(item => item.filter === filter.id).length;
    const isActive = activeFilterId === filter.id;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = [
      "inline-flex items-center gap-2 rounded-lg border px-3 py-1.5 text-xs font-bold transition-all focus:outline-none focus:ring-2 focus:ring-brand-500/30",
      isActive
        ? "bg-ink-900 border-ink-900 text-white"
        : "bg-white border-ink-100 text-ink-500 hover:border-brand-500 hover:text-ink-900"
    ].join(" ");
    btn.innerHTML = `<span>${escapeHtml(filter.title)}</span><span class="opacity-70">${count}</span>`;
    btn.addEventListener("click", () => {
      activeFilterId = filter.id;
      renderAll();
    });
    subtabsEl.appendChild(btn);
  });
}

function typeBadge(type) {
  if (type === "email") {
    return `<span class="inline-flex items-center gap-1 rounded-full bg-warn-50 text-warn-500 text-xs font-medium px-2 py-0.5">
      <svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
      بريد
    </span>`;
  }
  if (type === "link") {
    return `<span class="inline-flex items-center gap-1 rounded-full bg-brand-50 text-brand-700 text-xs font-medium px-2 py-0.5">
      <svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      رابط
    </span>`;
  }
  if (type === "file") {
    return `<span class="inline-flex items-center gap-1 rounded-full bg-brand-50 text-brand-700 text-xs font-medium px-2 py-0.5">
      <svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      ملف
    </span>`;
  }
  if (type === "folder") {
    return `<span class="inline-flex items-center gap-1 rounded-full bg-warn-50 text-warn-500 text-xs font-medium px-2 py-0.5">
      <svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      مجلد
    </span>`;
  }
  return `<span class="inline-flex items-center gap-1 rounded-full bg-success-50 text-success-600 text-xs font-medium px-2 py-0.5">
    <svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    نص
  </span>`;
}

function previewOf(item) {
  if (item.type === "text")   return item.text || "";
  if (item.type === "email")  return item.description || `mailto:${item.to}?cc=${item.cc || ''}&subject=${encodeURIComponent(item.subject)}&body=${encodeURIComponent(item.body)}إلى: ${item.to || "—"} • الموضوع: ${item.subject || "—"}mailto:${item.to}?cc=${item.cc || ''}&subject=${encodeURIComponent(item.subject)}&body=${encodeURIComponent(item.body)}`;
  if (item.type === "link")   return item.description || item.href;
  if (item.type === "file")   return item.description || item.href;
  if (item.type === "folder") return item.description ? `${item.description}\n${item.path || ""}` : item.path;
  return "";
}

function matchesQuery(item, q) {
  if (!q) return true;
  const hay = [
    item.title || "",
    item.text || "",
    item.description || "",
    item.subject || "",
    item.body || "",
    item.to || "",
    item.href || "",
    item.path || "",
  ].join(" ").toLowerCase();
  return hay.includes(q);
}

function renderGrid() {
  const group = getActiveGroup();
  groupTitleEl.textContent = group.title;
  groupDescEl.textContent = group.description || "";

  const items = visibleItemsFor(group);
  resultCountEl.textContent = `${items.length} عنصر`;
  gridEl.innerHTML = "";

  if (items.length === 0) {
    emptyEl.classList.remove("hidden");
    return;
  }
  emptyEl.classList.add("hidden");

  items.forEach((item) => {
    const detail = item.href || item.path || "";
    const card = document.createElement("button");
    card.type = "button";
    card.className = "group relative flex h-full flex-col rounded-xl border border-ink-100 bg-white p-5 text-start shadow-card transition-all hover:-translate-y-0.5 hover:shadow-cardHover hover:border-brand-500/40 focus:outline-none focus:ring-2 focus:ring-brand-500/30";
    card.innerHTML = `
      <div class="flex items-center justify-between gap-2 mb-2">
        <h3 class="text-sm font-bold leading-tight text-ink-900">${escapeHtml(item.title)}</h3>
        ${typeBadge(item.type)}
      </div>
      <p class="line-clamp-3 whitespace-pre-line text-sm leading-relaxed text-ink-500">${escapeHtml(previewOf(item))}</p>
      ${detail ? `<p class="mt-4 truncate rounded-lg bg-ink-50 px-2.5 py-2 text-xs font-medium text-ink-500" dir="ltr">${escapeHtml(detail)}</p>` : ""}
    `;
    card.addEventListener("click", () => handleAction(item, card));
    gridEl.appendChild(card);
  });
}

function renderAll() {
  renderTabs();
  renderSubtabs();
  renderGrid();
}

/* ============================================================
   ACTIONS
============================================================ */
async function handleAction(item, cardEl) {
  if (item.type === "text") {
    const ok = await copyToClipboard(item.text || "");
    if (ok) {
      flashCard(cardEl, "success");
      toast({ title: "تم النسخ", desc: item.title, kind: "success" });
    } else {
      toast({ title: "تعذّر النسخ", desc: "حاول مرة أخرى أو انسخ النص يدوياً", kind: "error" });
    }
    return;
  }

  if (item.type === "email") {
    const url = buildMailto(item);
    window.location.href = url;
    flashCard(cardEl, "info");
    toast({ title: "جارٍ فتح البريد", desc: item.title, kind: "info" });
    return;
  }

  if (item.type === "link") {
    const win = window.open(item.href, "_blank", "noopener,noreferrer");
    flashCard(cardEl, "info");
    toast(win
      ? { title: "تم فتح الرابط", desc: item.title, kind: "info" }
      : { title: "تعذّر الفتح", desc: "تأكد من السماح بالنوافذ المنبثقة", kind: "error" }
    );
    return;
  }

  if (item.type === "file") {
    const win = window.open(item.href, "_blank");
    flashCard(cardEl, "info");
    toast(win
      ? { title: "جارٍ فتح الملف", desc: item.title, kind: "info" }
      : { title: "تعذّر الفتح", desc: "تأكد من وجود الملف بجانب index.html والسماح بالنوافذ المنبثقة", kind: "error" }
    );
    return;
  }

  if (item.type === "folder") {
    const ok = await copyToClipboard(item.path || "");
    if (ok) {
      flashCard(cardEl, "success");
      toast({ title: "تم نسخ مسار المجلد", desc: "الصقه في File Explorer", kind: "success" });
    } else {
      toast({ title: "تعذّر نسخ المسار", desc: "انسخه يدوياً من البطاقة", kind: "error" });
    }
  }
}

function buildMailto({ to = "", cc = "", subject = "", body = "" }) {
  const params = [];

  if (cc) params.push("cc=" + encodeURIComponent(cc));
  if (subject) params.push("subject=" + encodeURIComponent(subject));
  if (body) params.push("body=" + encodeURIComponent(body));

  return "mailto:" + encodeURIComponent(to).replace(/%40/g, "@") +
    (params.length ? "?" + params.join("&") : "");
}

async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (_) {}
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.top = "0";
    ta.style.left = "0";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, ta.value.length);
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch (_) {
    return false;
  }
}

/* ============================================================
   FEEDBACK (flash + toast)
============================================================ */
function flashCard(el, kind) {
  const cls = kind === "success" ? "card-flash-success" : "card-flash-info";
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), 1200);
}

function toast({ title, desc = "", kind = "success" }) {
  const wrap = document.getElementById("toasts");
  const colors = {
    success: "border-success-500/30 bg-white text-ink-900",
    info:    "border-brand-500/30 bg-white text-ink-900",
    error:   "border-red-300 bg-white text-ink-900",
  };
  const dot = {
    success: "bg-success-500",
    info:    "bg-brand-600",
    error:   "bg-red-500",
  }[kind] || "bg-success-500";

  const el = document.createElement("div");
  el.className = `toast-enter min-w-[240px] max-w-[340px] rounded-lg border ${colors[kind] || colors.success} shadow-cardHover px-4 py-3 flex items-start gap-3`;
  el.innerHTML = `
    <span class="mt-1.5 inline-block h-2 w-2 rounded-full ${dot}"></span>
    <div class="flex-1">
      <div class="text-sm font-bold">${escapeHtml(title)}</div>
      ${desc ? `<div class="text-xs text-ink-500 mt-0.5">${escapeHtml(desc)}</div>` : ""}
    </div>
  `;
  wrap.appendChild(el);
  requestAnimationFrame(() => {
    el.classList.remove("toast-enter");
    el.classList.add("toast-show");
  });
  setTimeout(() => {
    el.classList.remove("toast-show");
    el.classList.add("toast-leave");
    setTimeout(() => el.remove(), 250);
  }, 1800);
}

/* ============================================================
   UTIL
============================================================ */
function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

searchInput.addEventListener("input", (e) => {
  query = e.target.value;
  renderGrid();
});

renderAll();
