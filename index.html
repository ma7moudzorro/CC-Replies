// Users requiring 2FA password
const TFA_USERS = {
  "2636": "0000"  // Mahmoud Ramadan
};

const hrCodeForm = document.getElementById("hrCodeForm");
const passwordForm = document.getElementById("passwordForm");
const hrCodeInput = document.getElementById("hrCodeInput");
const hrCodeBtn = document.getElementById("hrCodeBtn");
const passwordInput = document.getElementById("passwordInput");
const passwordBtn = document.getElementById("passwordBtn");
const backBtn = document.getElementById("backBtn");
const errorMsg = document.getElementById("errorMsg");
const errorText = document.getElementById("errorText");
const loadingState = document.getElementById("loadingState");

let currentHrCode = null;

// Format full name to first two names
function getShortName(fullName) {
  const parts = fullName.trim().split(" ");
  return parts.slice(0, 2).join(" ");
}

// Show error
function showError(message) {
  errorText.textContent = message;
  errorMsg.classList.remove("hidden");
  setTimeout(() => {
    errorMsg.classList.add("hidden");
  }, 4000);
}

// Show loading
function setLoading(isLoading) {
  if (isLoading) {
    hrCodeBtn.disabled = true;
    passwordBtn.disabled = true;
    loadingState.classList.remove("hidden");
  } else {
    hrCodeBtn.disabled = false;
    passwordBtn.disabled = false;
    loadingState.classList.add("hidden");
  }
}

// Handle HR Code submission
hrCodeBtn.addEventListener("click", () => {
  const code = hrCodeInput.value.trim();
  
  if (!code) {
    showError("من فضلك أدخل رمز الموارد البشرية");
    return;
  }

  setLoading(true);

  // Simulate API delay
  setTimeout(() => {
    const employee = EMPLOYEES.find(e => e.code === code);
    
    if (!employee) {
      setLoading(false);
      showError("رمز الموارد البشرية غير صحيح. يرجى المحاولة مرة أخرى.");
      hrCodeInput.focus();
      return;
    }

    currentHrCode = code;

    // Check if user needs 2FA
    if (code in TFA_USERS) {
      setLoading(false);
      hrCodeForm.classList.add("hidden");
      passwordForm.classList.remove("hidden");
      passwordInput.focus();
    } else {
      // Direct login without 2FA
      loginUser(employee);
    }
  }, 600);
});

// Handle Password submission
passwordBtn.addEventListener("click", () => {
  const password = passwordInput.value;

  if (!password) {
    showError("من فضلك أدخل كلمة المرور");
    return;
  }

  setLoading(true);

  setTimeout(() => {
    if (TFA_USERS[currentHrCode] !== password) {
      setLoading(false);
      showError("كلمة المرور غير صحيحة. يرجى المحاولة مرة أخرى.");
      passwordInput.focus();
      return;
    }

    const employee = EMPLOYEES.find(e => e.code === currentHrCode);
    loginUser(employee);
  }, 600);
});

// Back button
backBtn.addEventListener("click", () => {
  passwordForm.classList.add("hidden");
  hrCodeForm.classList.remove("hidden");
  hrCodeInput.focus();
  passwordInput.value = "";
  currentHrCode = null;
  setLoading(false);
});

// Login user
function loginUser(employee) {
  const userData = {
    code: employee.code,
    name: getShortName(employee.name),
    fullName: employee.name,
    type: employee.type
  };

  sessionStorage.setItem("user", JSON.stringify(userData));
  
  toast({ title: `مرحباً بك`, desc: userData.name, kind: "success" });
  
  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 800);
}

// Toast notification
function toast({ title, desc = "", kind = "success" }) {
  const wrap = document.getElementById("toasts");
  const colors = { success: "border-success-500/30 bg-white", info: "border-brand-500/30 bg-white" };
  const dot = { success: "bg-success-500", info: "bg-brand-600" };

  const el = document.createElement("div");
  el.className = `toast-enter min-w-[240px] max-w-[340px] rounded-lg border ${colors[kind]} shadow-lg px-4 py-3 flex items-start gap-3`;
  el.innerHTML = `
    <span class="mt-1.5 inline-block h-2 w-2 rounded-full ${dot[kind]}"></span>
    <div class="flex-1">
      <div class="text-sm font-bold text-ink-900">${title}</div>
      ${desc ? `<div class="text-xs text-ink-500 mt-0.5">${desc}</div>` : ""}
    </div>
  `;
  wrap.appendChild(el);
  requestAnimationFrame(() => {
    el.classList.remove("toast-enter");
    el.classList.add("toast-show");
  });
  setTimeout(() => {
    el.classList.remove("toast-show");
    el.classList.add("toast-leave");
    setTimeout(() => el.remove(), 250);
  }, 1800);
}

// Auto-focus on load
hrCodeInput.focus();

// Allow Enter key
document.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    if (hrCodeForm.classList.contains("hidden")) {
      passwordBtn.click();
    } else {
      hrCodeBtn.click();
    }
  }
});
