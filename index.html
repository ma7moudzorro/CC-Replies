<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>لوحة النسخ السريع</title>
<meta name="description" content="لوحة احترافية لنسخ النصوص وفتح القوالب البريدية والملفات بنقرة واحدة." />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Tajawal', 'system-ui', 'sans-serif'] },
        colors: {
          brand: {
            50:  '#eff6ff',
            100: '#dbeafe',
            500: '#3b82f6',
            600: '#2563eb',
            700: '#1d4ed8',
          },
          ink: {
            900: '#0f172a',
            700: '#334155',
            500: '#64748b',
            300: '#cbd5e1',
            100: '#f1f5f9',
            50:  '#f8fafc',
          },
          success: { 500: '#10b981', 600: '#059669', 50: '#ecfdf5' },
          warn:    { 500: '#f59e0b', 50: '#fffbeb' },
        },
        boxShadow: {
          card: '0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06)',
          cardHover: '0 8px 24px -8px rgba(15,23,42,0.18)',
        }
      }
    }
  };
</script>
<style>
  html, body { font-family: 'Tajawal', system-ui, sans-serif; }
  body { background: #f8fafc; color: #0f172a; }
  .line-clamp-3 {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .toast-enter { transform: translateY(10px); opacity: 0; }
  .toast-show  { transform: translateY(0);    opacity: 1; transition: all .25s ease; }
  .toast-leave { transform: translateY(10px); opacity: 0; transition: all .25s ease; }
  .card-flash-success { box-shadow: 0 0 0 2px rgba(16,185,129,.35); border-color: #10b981 !important; background: #ecfdf5; }
  .card-flash-info    { box-shadow: 0 0 0 2px rgba(37,99,235,.35);  border-color: #2563eb !important; background: #eff6ff; }
</style>
</head>
<body class="min-h-screen">

<!-- HEADER -->
<header class="bg-white/80 backdrop-blur border-b border-ink-100 sticky top-0 z-30">
  <div class="max-w-7xl mx-auto px-5 py-5">
    <div class="flex items-start gap-3 mb-5">
      <div class="h-11 w-11 rounded-xl bg-brand-600 text-white flex items-center justify-center shadow-card">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.39 4.84L20 8l-4 3.9.94 5.5L12 14.77 7.06 17.4 8 11.9 4 8l5.61-1.16L12 2z"/></svg>
      </div>
      <div>
        <h1 class="text-2xl font-extrabold tracking-tight text-ink-900">لوحة النسخ السريع</h1>
        <p class="text-sm text-ink-500 mt-0.5">انقر على أي بطاقة لتنفيذ إجراء فوري: نسخ نص، فتح بريد، أو تشغيل ملف.</p>
      </div>
    </div>

    <!-- TABS -->
    <nav id="tabs" class="flex flex-wrap gap-2"></nav>
  </div>
</header>

<!-- MAIN -->
<main class="max-w-7xl mx-auto px-5 py-8">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
    <div>
      <h2 id="groupTitle" class="text-xl font-bold text-ink-900"></h2>
      <p id="groupDesc" class="text-sm text-ink-500 mt-0.5"></p>
    </div>
    <div class="relative w-full sm:w-72">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-ink-500 absolute top-1/2 -translate-y-1/2 end-3.5 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchInput" type="text" placeholder="ابحث ضمن هذه المجموعة..." class="w-full h-11 rounded-lg border border-ink-300 bg-white pe-10 ps-3 text-sm shadow-card focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20" />
    </div>
  </div>

  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
  <div id="empty" class="hidden rounded-xl border border-dashed border-ink-300 bg-white/40 py-16 text-center text-sm text-ink-500">لا توجد نتائج</div>
</main>

<!-- TOAST CONTAINER -->
<div id="toasts" class="fixed bottom-5 start-5 z-50 flex flex-col gap-2"></div>

<script>
/* ============================================================
   DATA — أضف أو عدّل المحتوى هنا
   أنواع البطاقات:
     - "text"  : ينسخ النص إلى الحافظة
     - "email" : يفتح برنامج البريد (mailto)
     - "file"  : يفتح ملفًا في تبويب جديد (يجب وضع الملف بجانب index.html)
============================================================ */
const GROUPS = [
  {
    id: "greetings",
    title: "التحيات",
    description: "عبارات الترحيب والافتتاح",
    items: [
      { type: "text", title: "تحية رسمية", text: "السلام عليكم ورحمة الله وبركاته،\nنشكركم على تواصلكم معنا." },
      { type: "text", title: "صباح الخير", text: "صباح الخير، كيف يمكنني مساعدتك اليوم؟" },
      { type: "text", title: "مساء الخير", text: "مساء الخير، يسعدنا تواصلك معنا." },
      { type: "text", title: "ترحيب ودي", text: "أهلاً وسهلاً بك، نتمنى لك يوماً سعيداً." },
    ],
  },
  {
    id: "support",
    title: "الدعم الفني",
    description: "ردود جاهزة لطلبات الدعم",
    items: [
      { type: "text", title: "تم استلام طلبك", text: "شكراً لتواصلك مع الدعم الفني. تم استلام طلبك وسيقوم أحد أعضاء فريقنا بالرد خلال 24 ساعة." },
      { type: "text", title: "طلب لقطة شاشة", text: "هل يمكنك إرسال لقطة شاشة للمشكلة مع توضيح الخطوات التي أدت إليها؟" },
      { type: "text", title: "تم حل المشكلة", text: "يسرنا إعلامك بأنه تم حل المشكلة. لا تتردد في التواصل معنا في حال احتجت إلى أي مساعدة إضافية." },
      { type: "text", title: "خطوات إعادة التشغيل", text: "يرجى تجربة إعادة تشغيل التطبيق ومسح ذاكرة التخزين المؤقت للمتصفح، ثم إعلامنا في حال استمرت المشكلة." },
      { type: "text", title: "قيد المتابعة", text: "نود إعلامك بأن طلبك قيد المتابعة من قبل الفريق المختص، وسنوافيك بالمستجدات في أقرب وقت." },
    ],
  },
  {
    id: "emails",
    title: "قوالب البريد",
    description: "قوالب بريدية تفتح في برنامج البريد مباشرةً",
    items: [
      {
        type: "email",
        title: "طلب اجتماع",
        description: "بريد لطلب موعد اجتماع لمناقشة المشروع.",
        to: "client@example.com",
        subject: "طلب اجتماع لمناقشة المشروع",
        body: "مرحباً،\n\nأتمنى أن يصلك هذا البريد وأنت بخير. أود تحديد موعد اجتماع في أقرب وقت يناسبك لمناقشة تفاصيل المشروع.\n\nمع خالص الشكر،\n[الاسم]"
      },
      {
        type: "email",
        title: "متابعة طلب",
        description: "بريد متابعة لطلب سابق لم يُرَدّ عليه.",
        to: "support@example.com",
        subject: "متابعة بخصوص الطلب السابق",
        body: "مرحباً،\n\nأتابع معكم بخصوص الرسالة السابقة. يرجى إعلامي في حال احتجتم إلى أي معلومات إضافية.\n\nشكراً لتعاونكم،\n[الاسم]"
      },
      {
        type: "email",
        title: "تأكيد استلام",
        description: "تأكيد استلام رسالة من العميل.",
        to: "",
        subject: "تأكيد استلام رسالتكم",
        body: "نود تأكيد استلامنا لرسالتكم، وسنقوم بالرد عليها في أقرب وقت ممكن.\n\nمع التحية،\n[الاسم]"
      },
      {
        type: "email",
        title: "رسالة شكر",
        description: "بريد شكر بعد اجتماع أو تعاون.",
        to: "",
        subject: "شكراً لكم",
        body: "شكراً لكم على وقتكم واهتمامكم. أتطلع إلى الرد منكم قريباً.\n\nمع خالص التقدير،\n[الاسم]"
      },
    ],
  },
  {
    id: "files",
    title: "الملفات والسياسات",
    description: "ملفات PDF تُفتح في تبويب جديد. ضع الملفات في نفس مجلد index.html.",
    items: [
      { type: "file", title: "سياسة الشركة", description: "policy.pdf — السياسة الداخلية المعتمدة.", href: "policy.pdf" },
      { type: "file", title: "دليل المستخدم", description: "user-guide.pdf — خطوات الاستخدام التفصيلية.", href: "user-guide.pdf" },
      { type: "file", title: "نموذج طلب إجازة", description: "leave-form.pdf — يُعبأ ويُرسل للموارد البشرية.", href: "leave-form.pdf" },
      { type: "file", title: "قائمة الأسعار", description: "pricing.pdf — أحدث قائمة بأسعار الخدمات.", href: "pricing.pdf" },
    ],
  },
];

/* ============================================================
   STATE & RENDER
============================================================ */
let activeGroupId = GROUPS[0].id;
let query = "";

const tabsEl = document.getElementById("tabs");
const gridEl = document.getElementById("grid");
const emptyEl = document.getElementById("empty");
const groupTitleEl = document.getElementById("groupTitle");
const groupDescEl = document.getElementById("groupDesc");
const searchInput = document.getElementById("searchInput");

function getActiveGroup() {
  return GROUPS.find(g => g.id === activeGroupId) || GROUPS[0];
}

function renderTabs() {
  tabsEl.innerHTML = "";
  GROUPS.forEach(g => {
    const isActive = g.id === activeGroupId;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = [
      "inline-flex items-center gap-2 rounded-full border px-4 py-2 text-sm font-medium transition-all focus:outline-none focus:ring-2 focus:ring-brand-500/30",
      isActive
        ? "bg-brand-600 border-brand-600 text-white shadow-card"
        : "bg-white border-ink-300 text-ink-700 hover:border-brand-500 hover:text-ink-900"
    ].join(" ");
    btn.innerHTML = `
      <span>${g.title}</span>
      <span class="rounded-full px-1.5 text-xs ${isActive ? 'bg-white/20 text-white' : 'bg-ink-100 text-ink-500'}">${g.items.length}</span>
    `;
    btn.addEventListener("click", () => {
      activeGroupId = g.id;
      query = "";
      searchInput.value = "";
      renderAll();
    });
    tabsEl.appendChild(btn);
  });
}

function typeBadge(type) {
  if (type === "email") {
    return `<span class="inline-flex items-center gap-1 rounded-full bg-warn-50 text-warn-500 text-xs font-medium px-2 py-0.5">
      <svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
      بريد
    </span>`;
  }
  if (type === "file") {
    return `<span class="inline-flex items-center gap-1 rounded-full bg-brand-50 text-brand-700 text-xs font-medium px-2 py-0.5">
      <svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      ملف
    </span>`;
  }
  return `<span class="inline-flex items-center gap-1 rounded-full bg-success-50 text-success-600 text-xs font-medium px-2 py-0.5">
    <svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    نص
  </span>`;
}

function previewOf(item) {
  if (item.type === "text")  return item.text || "";
  if (item.type === "email") return item.description || `إلى: ${item.to || "—"} • الموضوع: ${item.subject || "—"}`;
  if (item.type === "file")  return item.description || item.href;
  return "";
}

function matchesQuery(item, q) {
  if (!q) return true;
  const hay = [
    item.title || "",
    item.text || "",
    item.description || "",
    item.subject || "",
    item.body || "",
    item.to || "",
    item.href || "",
  ].join(" ").toLowerCase();
  return hay.includes(q);
}

function renderGrid() {
  const group = getActiveGroup();
  groupTitleEl.textContent = group.title;
  groupDescEl.textContent = group.description || "";

  const q = query.trim().toLowerCase();
  const items = group.items.filter(it => matchesQuery(it, q));

  gridEl.innerHTML = "";
  if (items.length === 0) {
    emptyEl.classList.remove("hidden");
    return;
  }
  emptyEl.classList.add("hidden");

  items.forEach((item, idx) => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "group relative flex h-full flex-col rounded-xl border border-ink-100 bg-white p-5 text-start shadow-card transition-all hover:-translate-y-0.5 hover:shadow-cardHover hover:border-brand-500/40 focus:outline-none focus:ring-2 focus:ring-brand-500/30";
    card.innerHTML = `
      <div class="flex items-center justify-between gap-2 mb-2">
        <h3 class="text-sm font-bold leading-tight text-ink-900">${escapeHtml(item.title)}</h3>
        ${typeBadge(item.type)}
      </div>
      <p class="line-clamp-3 whitespace-pre-line text-sm leading-relaxed text-ink-500">${escapeHtml(previewOf(item))}</p>
    `;
    card.addEventListener("click", () => handleAction(item, card));
    gridEl.appendChild(card);
  });
}

function renderAll() {
  renderTabs();
  renderGrid();
}

/* ============================================================
   ACTIONS
============================================================ */
async function handleAction(item, cardEl) {
  if (item.type === "text") {
    const ok = await copyToClipboard(item.text || "");
    if (ok) {
      flashCard(cardEl, "success");
      toast({ title: "تم النسخ", desc: item.title, kind: "success" });
    } else {
      toast({ title: "تعذّر النسخ", desc: "حاول مرة أخرى", kind: "error" });
    }
    return;
  }
  if (item.type === "email") {
    const url = buildMailto(item);
    window.location.href = url;
    flashCard(cardEl, "info");
    toast({ title: "جارٍ فتح البريد", desc: item.title, kind: "info" });
    return;
  }
  if (item.type === "file") {
    const win = window.open(item.href, "_blank");
    flashCard(cardEl, "info");
    if (!win) {
      toast({ title: "تعذّر الفتح", desc: "تأكد من السماح بالنوافذ المنبثقة", kind: "error" });
    } else {
      toast({ title: "جارٍ فتح الملف", desc: item.title, kind: "info" });
    }
  }
}

function buildMailto({ to = "", subject = "", body = "" }) {
  const params = [];
  if (subject) params.push("subject=" + encodeURIComponent(subject));
  if (body)    params.push("body="    + encodeURIComponent(body));
  return "mailto:" + encodeURIComponent(to).replace(/%40/g, "@") + (params.length ? "?" + params.join("&") : "");
}

async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (_) {}
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.top = "0";
    ta.style.left = "0";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch (_) {
    return false;
  }
}

/* ============================================================
   FEEDBACK (flash + toast)
============================================================ */
function flashCard(el, kind) {
  const cls = kind === "success" ? "card-flash-success" : "card-flash-info";
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), 1200);
}

function toast({ title, desc = "", kind = "success" }) {
  const wrap = document.getElementById("toasts");
  const colors = {
    success: "border-success-500/30 bg-white text-ink-900",
    info:    "border-brand-500/30 bg-white text-ink-900",
    error:   "border-red-300 bg-white text-ink-900",
  };
  const dot = {
    success: "bg-success-500",
    info:    "bg-brand-600",
    error:   "bg-red-500",
  }[kind] || "bg-success-500";

  const el = document.createElement("div");
  el.className = `toast-enter min-w-[240px] max-w-[340px] rounded-lg border ${colors[kind] || colors.success} shadow-cardHover px-4 py-3 flex items-start gap-3`;
  el.innerHTML = `
    <span class="mt-1.5 inline-block h-2 w-2 rounded-full ${dot}"></span>
    <div class="flex-1">
      <div class="text-sm font-bold">${escapeHtml(title)}</div>
      ${desc ? `<div class="text-xs text-ink-500 mt-0.5">${escapeHtml(desc)}</div>` : ""}
    </div>
  `;
  wrap.appendChild(el);
  requestAnimationFrame(() => {
    el.classList.remove("toast-enter");
    el.classList.add("toast-show");
  });
  setTimeout(() => {
    el.classList.remove("toast-show");
    el.classList.add("toast-leave");
    setTimeout(() => el.remove(), 250);
  }, 1800);
}

/* ============================================================
   UTIL
============================================================ */
function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

searchInput.addEventListener("input", (e) => {
  query = e.target.value;
  renderGrid();
});

renderAll();
</script>
</body>
</html>
