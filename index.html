<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Light professional blue gradient */
            background: linear-gradient(135deg, #ece9e6, #ffffff);
            background-color: #f0f7ff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #2c3e50;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        /* Smooth pulse animation for the icon */
        .maintenance-icon {
            width: 80px;
            height: 80px;
            background-color: #3498db;
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 2s infinite ease-in-out;
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.2);
        }

        .maintenance-icon svg {
            fill: white;
            width: 40px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.1rem;
            color: #5d6d7e;
            margin-bottom: 40px;
        }

        .footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
        }

        .contact-link {
            text-decoration: none;
            color: #3498db;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .contact-link:hover {
            border-bottom: 1px solid #3498db;
            color: #2980b9;
        }

        .email-label {
            display: block;
            font-size: 0.9rem;
            color: #aeb6bf;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="maintenance-icon">
            <svg viewBox="0 0 24 24"><path d="M22,19H2V17H22V19M15.3,16.4C15.1,16.2 15,16 15,15.7C15,15.4 15.1,15.2 15.3,15L17.3,13C17.5,12.8 17.7,12.7 18,12.7C18.3,12.7 18.5,12.8 18.7,13L20.7,15C20.9,15.2 21,15.4 21,15.7C21,16 20.9,16.2 20.7,16.4L18.7,18.4C18.5,18.6 18.3,18.7 18,18.7C17.7,18.7 17.5,18.6 17.3,18.4L15.3,16.4M3,13V4H21V11.2C20.4,10.6 19.5,10.2 18.6,10.1C18.4,10.1 18.2,10.1 18,10.1C16.4,10.1 15,10.7 13.9,11.8L3,13Z"/></svg>
        </div>
        <h1>It's under maintenance</h1>
        <p>We're refining our experience. We'll be back shortly.</p>
    </div>

    <div class="footer">
        <span class="email-label">Get in touch</span>
        <a href="mailto:Mahmoudmou21@gmail.com" class="contact-link">Mahmoudmou21@gmail.com</a>
    </div>

</body>
</html>
