    theme: {
      extend: {
        fontFamily: { sans: ['Tajawal', 'system-ui', 'sans-serif'] },

<style>

<body class="min-h-screen">

<header class="bg-white/80 backdrop-blur border-b border-ink-100 sticky top-0 z-30">
  <div class="max-w-7xl mx-auto px-5 py-5">
    <div class="flex items-start gap-3 mb-5">
      <div class="h-11 w-11 rounded-xl bg-brand-600 text-white flex items-center justify-center shadow-card">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.39 4.84L20 8l-4 3.9.94 5.5L12 14.77 7.06 17.4 8 11.9 4 8l5.61-1.16L12 2z"/></svg>
      </div>
      <div>
        <h1 class="text-2xl font-extrabold tracking-tight text-ink-900">Ramadouna's Dashboard</h1>
        <p class="text-sm text-ink-500 mt-0.5">المراجعة النهائية في الموافقات الطبية</p>
      </div>
    </div>
    <nav id="tabs" class="flex flex-wrap gap-2"></nav>
  </div>
</header>

<main class="max-w-7xl mx-auto px-5 py-8">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
    <div>
      <h2 id="groupTitle" class="text-xl font-bold text-ink-900"></h2>
      <p id="groupDesc" class="text-sm text-ink-500 mt-0.5"></p>
    </div>
    <div class="relative w-full sm:w-72">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-ink-500 absolute top-1/2 -translate-y-1/2 end-3.5 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchInput" type="text" placeholder="ابحث ضمن هذه المجموعة..." class="w-full h-11 rounded-lg border border-ink-300 bg-white pe-10 ps-3 text-sm shadow-card focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20" />
    </div>
  </div>

  <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-6">
    <nav id="subtabs" class="flex flex-wrap gap-2"></nav>
    <div id="resultCount" class="text-xs font-bold text-ink-500"></div>
  </div>

  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
  <div id="empty" class="hidden rounded-xl border border-dashed border-ink-300 bg-white/40 py-16 text-center text-sm text-ink-500">لا توجد نتائج</div>
</main>

<div id="toasts" class="fixed bottom-5 start-5 z-50 flex flex-col gap-2"></div>

<div id="noteModal" class="fixed inset-0 z-50 hidden bg-black/40 flex items-center justify-center">
  <div class="relative w-full max-w-2xl mx-5 bg-white rounded-2xl shadow-2xl">
    <div class="flex items-center justify-between p-6 border-b border-ink-100">
      <h2 id="noteTitle" class="text-xl font-bold text-ink-900"></h2>
      <button id="closeNoteBtn" type="button" class="text-ink-500 hover:text-ink-900 hover:bg-ink-100 transition-all p-2 rounded-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6l-12 12M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-6 max-h-96 overflow-y-auto">
      <p id="noteContent" class="whitespace-pre-line leading-relaxed text-ink-700 text-sm"></p>
    </div>
  </div>
</div>

  {
    id: "notes",
    title: "Medical Notes",
    description: "ملاحظات مهمة وملخصات سريعة",
    items: [
  { 
    type: "note", 
    title: "عقد Future University - حدود الـ PK", 
    text: "عقد Future University ليميت الـ PK فيه لـ Class B هو 2000 ج و Class C هو 1200 ج. الصرف يتم كل 30 يوماً؛ لذا إذا حاول العميل الصرف قبل مرور 30 يوماً سيظهر له نسبة تحمل عالية. يمكن عمل Void للصيدلية وتوجيه العميل للصرف بعد مرور الـ 30 يوماً بدلاً من طلب Override." 
  },
  { 
    type: "note", 
    title: "سياسة Orange - متابعة الحمل", 
    text: "في بوليصة Orange: الأدوية والفحوصات الخاصة بالأمومة (Maternity) تُغطى من ليميت الـ AML (Physical illness). أما زيارات المتابعة والسونار تُغطى من ليميت الـ 3000 جنيه الخاص بالأمومة." 
  },
  { 
    type: "note", 
    title: "سياسة Royal - إلغاء الموافقات", 
    text: "لجميع بوالص Royal: في حالة إلغاء الموافقة أو تغيير مقدم الخدمة، لا تطلب من العميل ختم الإلغاء من مقدم الخدمة. يطبق هذا على خدمات العيادات الخارجية (OP) بدون حد مالي. في حالات الـ IP يتم التواصل مع مقدم الخدمة للتأكد من الاستخدام." 
  },
  { 
    type: "note", 
    title: "سياسة Indevco (Orient) - طلبات المزمن", 
    text: "لعقد Indevco تحت Orient: جميع طلبات الأدوية أو العلاج المزمن يجب أن ترسل من خلال جهات الاتصال المعتمدة (Authorized contacts). لا تُقبل الطلبات المباشرة من الأعضاء. يطبق هذا على نظام الـ PK فقط وليس الـ Scattered Chronic." 
  },
  { 
    type: "note", 
    title: "سياسة NTRA (Misr Insurance)", 
    text: "لعقد NTRA تحت مصر للتأمين: تُعتمد الفيتامينات (Multivitamins) في حالة إرسال الطلب عبر الـ HR وتُغطى من الـ Exclusion pool. تنظيف الأسنان (Polishing) مغطى من مزايا الأسنان. تحليل HOMA-IR مغطى بحد أقصى سنوي." 
  },
  { 
    type: "note", 
    title: "عقد Allianz Individual - كشف النظر", 
    text: "عقود Allianz Individual عادة ما تكون خدمات الأسنان والنظر بنظام الاسترداد (Reimbursement)، ولكن يمكن إصدار موافقة كشف النظر (ESE) من طرفنا مباشرة بناءً على ملاحظات الـ PGN." 
  },
  { 
    type: "note", 
    title: "سياسة Arab Bank (Allianz) - الحمل", 
    text: "لعقد Arab Bank: فحوصات وأشعة وأدوية الـ ANC تُغطى من الـ AML (Physical illness). زيارات متابعة الحمل والسونار تُغطى مرة واحدة شهرياً بحد أقصى 250 جنيهاً." 
  },
  { 
    type: "note", 
    title: "سياسة Sukari Gold Mines (Orient) - المستلزمات", 
    text: "جميع الغرسات الطبية (Medical Implants) مثل الشرائح والمسامير والدعامات وغيرها مغطاة لعقد Sukari Gold Mines تحت Orient." 
  },
  { 
    type: "note", 
    title: "سياسة Indevco (Orient) - ليميت الأدوية", 
    text: "لعقد Indevco: يوجد ليميت أدوية 15 ألف جنيه لكل عضو (باستثناء أدوية الأسنان والأمومة والـ PK). أي تجاوز لهذا الحد يحتاج موافقة من Antoine Ghanem. الملحوظة موجودة في الـ Contract note فقط وليس الـ TOB." 
  },
  { 
    type: "note", 
    title: "خدمات الأسنان - Onlay & Inlay", 
    text: "إجراءات الـ Onlay و Inlay لا تعتبر حشوات عادية بل تندرج تحت خدمات التعويضات (Prosthesis). يجب التأكد من غطاء الـ Prosthesis في البوليصة قبل القرار، إلا إذا ذكر غير ذلك في الـ PGN." 
  },
  { 
    type: "note", 
    title: "عقد BUE (Orient) - العلاج الطبيعي", 
    text: "الموافقة على جلسات العلاج الطبيعي في مستشفيات منطقة الشروق استثنائياً عند الحاجة لعقد BUE تحت شركة أورينت." 
  },
  { 
    type: "note", 
    title: "جرعات بخاخات الأنف (Nasal Spray)", 
    text: "الجرعة المعتمدة لبخاخات الأنف هي عبوة واحدة لكل 10 أيام في الحالات المتوسطة، وتزاد الكمية في حالات ما بعد العمليات الجراحية." 
  },
  { 
    type: "note", 
    title: "سياسة Tokio Marine - قطرات العين", 
    text: "جميع أنواع قطرات Systane مستثناة لعقد Tokio Marine باستثناء بوالص Nissan و IBS Al Thuraya. يتم استبدالها بـ Poly Fresh في الـ PK." 
  },
  { 
    type: "note", 
    title: "سياسة Al-Wataniya - الفيتامينات والمناعة", 
    text: "الفيتامينات للضرورة الطبية مغطاة، باستثناء فيتامين D (دواء) يغطى في حالات الحمل فقط. تحليل فيتامين D مستثنى تماماً. الأمراض المناعية (Autoimmune) غير مغطاة." 
  },
  { 
    type: "note", 
    title: "قيود تحليل فيتامين D للجهات المختلفة", 
    text: "1. Allianz/Royal: يغطى في حالات أمراض الكلى/الكبد، لين العظام، الهشاشة، الكساح (تحت 4 سنوات)، سوء الامتصاص، واضطراب الغدة الدرقية.\n2. Delta: نفس حالات Allianz بالإضافة إلى الكسور ونقص الفيتامين؛ ويرفض في حالات الإجهاد/الألم.\n3. Iskan: يغطى لحالات التهاب المفاصل فقط.\n4. Mohandes: يغطى لاضطرابات الغدة أو إذا وصفه طبيب عظام/أعصاب.\n5. Platinum/Mada: غير مغطى تماماً." 
  },
  { 
    type: "note", 
    title: "سياسة TMG (Misr Insurance) - المستشفيات المستثناة", 
    text: "لعقد TMG تحت مصر للتأمين: المستشفيات التالية مستثناة من البوليصة بالكامل: الجنزوري، أندلسية، تاون، النزهة الدولي، والكويتي ببنها." 
  },
  { 
    type: "note", 
    title: "تحديث Allianz - الفيتامينات المتعددة", 
    text: "يتم قبول الفيتامينات المتعددة (Multivitamins) في حالات تؤثر على الامتصاص مثل: أمراض كروان والقولون، أمراض الكبد والبنكرياس والمرارة، الأمراض المناعية، وحالات العلاج الإشعاعي أو الكيماوي." 
  },
  { 
    type: "note", 
    title: "سياسة إزالة الثآليل (Wart Removal)", 
    text: "1. Delta: تعليق الطلب (Pend) للاستفسار عن السبب التجميلي.\n2. Misr Insurance: ثآليل الوجه والأعضاء التناسلية غير مغطاة.\n3. Allianz: تعليق ثآليل الوجه للاستفسار عن السبب التجميلي.\n4. Royal: ثآليل القدم فقط مغطاة.\n5. Egyptian Takaful: ثآليل الأعضاء التناسلية غير مغطاة." 
  },
  { 
    type: "note", 
    title: "تحديث Allianz - التحاليل الجينية", 
    text: "التحاليل الجينية (Genetic testing) غير مغطاة إلا في حالات السرطان فقط." 
  },
  { 
    type: "note", 
    title: "سياسة Misr Insurance - التصلب المتعدد (MS)", 
    text: "مرض التصلب المتعدد (Multiple sclerosis) يكون مغطى في حالة تغطية الأمراض المناعية في العقد." 
  },
  { 
    type: "note", 
    title: "سياسة NTRA (Misr Insurance) - حمل", 
    text: "جلسات الحديد للأمومة ومضاعفاتها مغطاة حتى الحد الأقصى السنوي لعقد NTRA تحت مصر للتأمين." 
  },
  { 
    type: "note", 
    title: "سياسة Tokio Marine - الأمراض المناعية", 
    text: "الأمراض المناعية مغطاة لجميع البوالص بدءاً من 23-12-2025 (ما قبل ذلك يراجع الـ MOB). في العقود غير المغطاة، تُعتمد فحوصات المرة الأولى لتأكيد التشخيص فقط. مرض الثعلبة (Alopecia) غير مغطى." 
  },
  { 
    type: "note", 
    title: "أشعة الصبغة (HSG)", 
    text: "أشعة الصبغة على الرحم (Hystrosalpingography) غير مغطاة إلا إذا كانت البوليصة تغطي حالات العقم (Infertility)." 
  },
  { 
    type: "note", 
    title: "سياسة Misr Insurance - الأسنان والنظر", 
    text: "كشف الأسنان وكشف النظر مغطى حتى الحد الأقصى مع تطبيق نسبة التحمل الخاصة بالـ OP Consultation ما لم يذكر خلاف ذلك." 
  },
  { 
    type: "note", 
    title: "فحص البنتاكام (Pentacam)", 
    text: "فحص Pentacam يغطى في حالتين: 1. إذا كان العقد يغطي عمليات الليزك (كفحص ما قبل العملية). 2. لحالات القرنية المخروطية إذا كان العقد يغطي العيوب الخلقية (Congenital)." 
  },
  { 
    type: "note", 
    title: "سياسة Emirates NBD (Orient) - أكياس المبيض", 
    text: "تشخيص أكياس المبيض (Ovarian cyst) مغطى ويشمل كافة الخدمات المتعلقة (كشوفات، تحاليل، أدوية هرمونية، وأشعة بما فيها الـ 4D)." 
  },
  { 
    type: "note", 
    title: "سياسة Dar Cairo (Allianz) - العقم والعيوب الخلقية", 
    text: "حالات العقم (Infertility) للذكور والإناث مغطاة بحد فرعي 15 ألف جنيه. العيوب الخلقية للبالغين مغطاة أيضاً بنفس الحد الفرعي." 
  },
  { 
    type: "note", 
    title: "سياسة Carrefour - فئات C(N) و CF(N)", 
    text: "لموظفي كارفور فئات C(N) و CF(N): يوجد حد فرعي للأمراض المزمنة والسابقة للتعاقد؛ يجب حساب الاستهلاك يدوياً والرجوع للـ TOB للتأكد من المبالغ." 
  },
  { 
    type: "note", 
    title: "سياسة Orient & Royal - حدود أدوية المزمن", 
    text: "إذا كان للعقد حد منفصل للأدوية العادية وحد آخر للمزمن (Chronic/Pre-ex): في حالة انتهاء حد الأدوية العادية، يمكن صرف أدوية الحالات المزمنة أو الحرجة من الحد الخاص بها مباشرة ولا تُرفض." 
  },
  { 
    type: "note", 
    title: "سياسة Royal - أقراص الاستحلاب", 
    text: "أقراص الاستحلاب المسموح بها هي (Lary pro, Bradoral, Strepsils). أي أنواع أخرى (Candy lozenges) تعتبر غير مغطاة." 
  },
  { 
    type: "note", 
    title: "سياسة Orient - فيتامين E ومضادات الأكسدة", 
    text: "فيتامين E ومضادات الأكسدة تُغطى إذا كانت لضرورة طبية لحالات مغطاة (مثل ارتفاع دهون الدم)، وتُرفض في حالة عدم وجود ضرورة طبية أو إذا كانت لمرض مستثنى." 
  },
  { 
    type: "note", 
    title: "سياسة Orient - الشامبو والمطهرات", 
    text: "الشامبو الطبي (Medicated Shampoos) والمحاليل المطهرة (Antiseptic Solutions) مستثناة تماماً وغير مغطاة." 
  },
  { 
    type: "note", 
    title: "بوالص Allianz المطبق عليها إجراءات المرونة", 
    text: "الشركات المطبق عليها الـ Flexibility هي: Orange, Schlumberger, AAIB, Levare, Embassy of Netherlands, L'Oreal, U consumer finance, NCR ATM EG LLC." 
  },
  { 
    type: "note", 
    title: "برنامج دعم المرضى (PSP) - شريك Ray", 
    text: "برنامج توفير أدوية مجانية (Sanofi/AbbVie): تصدر الموافقة على الصيدلية المطلوبة، ويُضاف ملاحظة بالكمية الإضافية المجانية من Ray. يشترط احتفاظ العميل بالعبوات الفارغة لتسليمها لشركة Ray، وأن تكون الروشتة أصلية ومختومة (صلاحية 6 أشهر). يتم التواصل مع العميل خلال 48 ساعة والتوصيل خلال 72 ساعة." 
  },
  { 
    type: "note", 
    title: "سياسة المرطبات (AWC vs Allianz)", 
    text: "تغطية المرطبات في AWC تختلف عن Allianz؛ حيث تغطي AWC المرطبات ذات الأصل الصيدلاني (مثل Panthenol و Calamine) للضرورة الطبية. ملحوظة: Calamine يغطى للجلد ولكن يستثنى في حالات علاج حب الشباب." 
  },
  { 
    type: "note", 
    title: "حالات هرمون اللبن (Prolactinemia)", 
    text: "تُغطى حالات اضطراب هرمون اللبن (Hypo/Hyperprolactinemia) لشركتي Allianz و Orient في الحالات المرضية (Pathological Cases) فقط." 
  },
  { 
    type: "note", 
    title: "تصنيف دواء Sideral Active", 
    text: "يعتبر Sideral Active مكملاً للحديد (Iron supplement) ويُعامل معاملة أدوية الحديد، ولا يعتبر فيتامينات متعددة (Multi-vitamin)." 
  },
  { 
    type: "note", 
    title: "سياسة Orient - كريمات المساج", 
    text: "كريمات وجل المساج (Massage cream/gel/spray) مستثناة في نظام الـ PK، ولكن يتم الموافقة عليها بشكل طبيعي في الموافقات المنفصلة (Scattered)." 
  },
  { 
    type: "note", 
    title: "سياسة نهضة مصر (Orient) - الأدوية المرفوضة", 
    text: "لعقد نهضة مصر: تُرفض الأدوية التالية في جميع أنواع الموافقات (Acute/Scattered/PK): 1. أي دواء يحتوي على كولاجين (مثل CH Alpha و Genuphil Advance). 2. كريمات وجل وبخاخات المساج. 3. أدوية البروبيوتيك (Probiotics)." 
  },
  { 
    type: "note", 
    title: "تحليل مقاومة الأنسولين (HOMA-IR)", 
    text: "تحليل HOMA-IR مستثنى لجميع الجهات (حتى مع وجود إجراءات المرونة) إلا إذا ذكر نصاً في الـ TOB أو الـ PGN أنه مغطى." 
  },
  
  { 
    type: "note", 
    title: "جرعات Physiomer Nasal Spray", 
    text: "لحالات الجيوب الأنفية: عبوة واحدة لكل 10 أيام (بحد أقصى 3 عبوات). لحالات ما بعد العمليات: تُعتمد الكمية كاملة حسب الحالة الطبية (تصل لـ 10 عبوات)." 
  },
  { 
    type: "note", 
    title: "سياسة Royal - دواء L-carnitine", 
    text: "يُغطى دواء L-carnitine في ثلاث حالات فقط: الصرع (Epilepsy)، الفشل الكلوي (Renal failure)، والتهاب عضلة القلب (Myocarditis)." 
  },
  { 
    type: "note", 
    title: "تدوين الملاحظات الطبية - رموز التغطية", 
    text: "لتتبع استهلاك العملاء، يجب إضافة الجمل التالية في الـ Medical Notes حرفياً: *(benefit-critical)* للحالات الحرجة، و *(benefit-preex)* للحالات السابقة للتعاقد (إذا استخدم العميل خدمة مزمنة في أول 3 أشهر من اشتراكه). يطبق هذا على كافة البوالص." 
  },
  { 
    type: "note", 
    title: "كريمات Hyalo 4 وعلاج الندبات", 
    text: "Hyalo 4 Skin و Hyalo 4 Star مستثناة، بينما Hyalo 4 Control مغطى. لشركة Orient: تُغطى كريمات الندبات (Scaro, Hyalo) والمساعدات الطبية إذا كان السبب حادثاً مغطى. حقن المفاصل Hyalo مغطاة للركبة فقط ومستثناة للكتف." 
  },
  { 
    type: "note", 
    title: "منشطات الدورة الدموية المخية", 
    text: "تُغطى منشطات الدورة الدموية في حالات الدوار (Dizziness) وتُرفض في حالات الصداع. دواء Cerebrolysin يُعتمد لإصابات الدماغ والجلطات، وفي حالات الانزلاق الغضروفي (Disc)، ولكن يُرفض في حالات التهاب المفاصل أو الأعصاب العادي." 
  },
  { 
    type: "note", 
    title: "سياسة Selenium ACE - مضادات الأكسدة", 
    text: "يُغطى Selenium ACE كمضاد للأكسدة إذا وصف لحالات (نشاط الغدة، ارتفاع دهون الدم، اضطرابات الكبد أو الكلى) ما لم يكن مستثنى في الـ PGN." 
  },
  {

let activeGroupId = "tatsh";
let activeFilterId = "approved";
let query = "";

const tabsEl = document.getElementById("tabs");
const subtabsEl = document.getElementById("subtabs");
const gridEl = document.getElementById("grid");
const emptyEl = document.getElementById("empty");
const groupTitleEl = document.getElementById("groupTitle");
const groupDescEl = document.getElementById("groupDesc");
const searchInput = document.getElementById("searchInput");
const resultCountEl = document.getElementById("resultCount");
const noteModal = document.getElementById("noteModal");
const noteTitle = document.getElementById("noteTitle");
const noteContent = document.getElementById("noteContent");
const closeNoteBtn = document.getElementById("closeNoteBtn");

function getActiveGroup() {
  return GROUPS.find(g => g.id === activeGroupId) || GROUPS[0];
}

function renderTabs() {
  tabsEl.innerHTML = "";
  GROUPS.forEach(g => {
    const isActive = g.id === activeGroupId;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = isActive 
      ? "inline-flex items-center gap-2 rounded-full border px-4 py-2 text-sm font-medium bg-brand-600 border-brand-600 text-white shadow-card transition-all hover:shadow-cardHover" 
      : "inline-flex items-center gap-2 rounded-full border px-4 py-2 text-sm font-medium bg-white border-ink-300 text-ink-700 hover:border-brand-500 transition-all";
    btn.innerHTML = `<span>${g.title}</span><span class="rounded-full px-1.5 text-xs ${isActive ? 'bg-white/20 text-white' : 'bg-ink-100 text-ink-500'}">${g.items.length}</span>`;
    btn.addEventListener("click", () => {
      activeGroupId = g.id;
      activeFilterId = g.filters?.[0]?.id || "all";
      query = "";
      searchInput.value = "";
      renderAll();
    });
    tabsEl.appendChild(btn);
  });
}

function renderSubtabs() {
  const group = getActiveGroup();
  subtabsEl.innerHTML = "";
  
  if (!group.filters) {
    return;
  }
  
  group.filters.forEach(filter => {
    const count = group.items.filter(item => item.filter === filter.id).length;
    const isActive = activeFilterId === filter.id;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = isActive
      ? "inline-flex items-center gap-2 rounded-lg border px-3 py-1.5 text-xs font-bold bg-ink-900 border-ink-900 text-white transition-all hover:shadow-card"
      : "inline-flex items-center gap-2 rounded-lg border px-3 py-1.5 text-xs font-bold bg-white border-ink-100 text-ink-500 hover:border-brand-500 hover:text-ink-900 transition-all";
    btn.innerHTML = `<span>${filter.title}</span><span class="opacity-70">${count}</span>`;
    btn.addEventListener("click", () => {
      activeFilterId = filter.id;
      renderAll();
    });
    subtabsEl.appendChild(btn);
  });
}

function typeBadge(type) {
  const badges = {
    email: { icon: '<svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>', label: "بريد", color: "bg-warn-50 text-warn-500" },
    link: { icon: '<svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>', label: "رابط", color: "bg-brand-50 text-brand-700" },

    text: { icon: '<svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>', label: "نص", color: "bg-success-50 text-success-600" },

  const b = badges[type] || badges.text;
  return `<span class="inline-flex items-center gap-1 rounded-full ${b.color} text-xs font-medium px-2 py-0.5">${b.icon}${b.label}</span>`;

function renderGrid() {
  const group = getActiveGroup();
  groupTitleEl.textContent = group.title;
  groupDescEl.textContent = group.description || "";

  const q = query.trim().toLowerCase();
  const items = group.items.filter(item => {
    const filterOk = !group.filters || activeFilterId === "all" || item.filter === activeFilterId;
    const queryOk = !q || JSON.stringify(item).toLowerCase().includes(q);
    return filterOk && queryOk;
  });

  resultCountEl.textContent = `${items.length} عنصر`;
  gridEl.innerHTML = "";

  if (items.length === 0) {
    emptyEl.classList.remove("hidden");
    return;
  }
  emptyEl.classList.add("hidden");

  items.forEach((item) => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "group relative flex h-full flex-col rounded-xl border border-ink-100 bg-white p-5 text-start shadow-card transition-all hover:-translate-y-0.5 hover:shadow-cardHover hover:border-brand-500/40 cursor-pointer";
    
    let preview = "";
    if (item.type === "text") preview = item.text || "";
    else if (item.type === "note") preview = item.text || "";
    else if (item.type === "email") preview = item.description || `إلى: ${item.to}`;
    else if (item.type === "link") preview = item.description || item.href;
    else if (item.type === "file") preview = item.description || item.href;
    else if (item.type === "folder") preview = item.description || item.path;
    
    const detail = item.href || item.path || "";
    
    card.innerHTML = `
      <div class="flex items-center justify-between gap-2 mb-2">
        <h3 class="text-sm font-bold leading-tight text-ink-900">${item.title}</h3>
        ${typeBadge(item.type)}
      </div>
      <p class="line-clamp-3 whitespace-pre-line text-sm leading-relaxed text-ink-500">${preview}</p>
      ${detail ? `<p class="mt-4 truncate rounded-lg bg-ink-50 px-2.5 py-2 text-xs font-medium text-ink-500" dir="ltr">${detail}</p>` : ""}
    `;
    
    card.addEventListener("click", () => handleAction(item, card));
    gridEl.appendChild(card);
  });
}

function renderAll() {
  renderTabs();
  renderSubtabs();
  renderGrid();
}

function openNoteModal(title, content) {
  noteTitle.textContent = title;
  noteContent.textContent = content;
  noteModal.classList.remove("hidden");
  noteModal.classList.add("flex");
}

function closeNoteModal() {
  noteModal.classList.add("hidden");
  noteModal.classList.remove("flex");
}

async function handleAction(item, cardEl) {
  if (item.type === "text") {
    const ok = await copyToClipboard(item.text || "");
    if (ok) {
      flashCard(cardEl, "success");
      toast({ title: "تم النسخ", desc: item.title, kind: "success" });
    }
    return;
  }

  if (item.type === "note") {
    openNoteModal(item.title, item.text || "");
    flashCard(cardEl, "info");
    return;
  }

  if (item.type === "email") {
    const url = buildMailto(item);
    window.location.href = url;
    flashCard(cardEl, "info");
    toast({ title: "جارٍ فتح البريد", desc: item.title, kind: "info" });
    return;
  }

  if (item.type === "link") {
    window.open(item.href, "_blank");
    flashCard(cardEl, "info");
    toast({ title: "تم فتح الرابط", desc: item.title, kind: "info" });
    return;
  }

  if (item.type === "file") {
    window.open(item.href, "_blank");
    flashCard(cardEl, "info");
    toast({ title: "جارٍ فتح الملف", desc: item.title, kind: "info" });
    return;
  }

  if (item.type === "folder") {
    const ok = await copyToClipboard(item.path || "");
    if (ok) {
      flashCard(cardEl, "success");
      toast({ title: "تم نسخ مسار المجلد", desc: "الصقه في File Explorer", kind: "success" });
    }
  }
}

function buildMailto({ to = "", cc = "", subject = "", body = "" }) {
  const params = [];
  if (cc) params.push("cc=" + encodeURIComponent(cc));
  if (subject) params.push("subject=" + encodeURIComponent(subject));
  if (body) params.push("body=" + encodeURIComponent(body));
  return "mailto:" + encodeURIComponent(to).replace(/%40/g, "@") + (params.length ? "?" + params.join("&") : "");
}

async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (_) {}
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch (_) {
    return false;
  }
}

function flashCard(el, kind) {
  const cls = kind === "success" ? "card-flash-success" : "card-flash-info";
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), 1200);
}

function toast({ title, desc = "", kind = "success" }) {
  const wrap = document.getElementById("toasts");
  const colors = { success: "border-success-500/30 bg-white", info: "border-brand-500/30 bg-white", error: "border-red-300 bg-white" };
  const dot = { success: "bg-success-500", info: "bg-brand-600", error: "bg-red-500" };

  const el = document.createElement("div");
  el.className = `toast-enter min-w-[240px] max-w-[340px] rounded-lg border ${colors[kind]} shadow-cardHover px-4 py-3 flex items-start gap-3`;
  el.innerHTML = `
    <span class="mt-1.5 inline-block h-2 w-2 rounded-full ${dot[kind]}"></span>
    <div class="flex-1">
      <div class="text-sm font-bold text-ink-900">${title}</div>
      ${desc ? `<div class="text-xs text-ink-500 mt-0.5">${desc}</div>` : ""}
    </div>
  `;
  wrap.appendChild(el);
  requestAnimationFrame(() => {
    el.classList.remove("toast-enter");
    el.classList.add("toast-show");
  });
  setTimeout(() => {
    el.classList.remove("toast-show");
    el.classList.add("toast-leave");
    setTimeout(() => el.remove(), 250);
  }, 1800);
}

searchInput.addEventListener("input", (e) => {
  query = e.target.value;
  renderGrid();
});

closeNoteBtn.addEventListener("click", closeNoteModal);
noteModal.addEventListener("click", (e) => {
  if (e.target === noteModal) closeNoteModal();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeNoteModal();
});

renderAll();
