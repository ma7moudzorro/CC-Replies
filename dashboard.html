<style>

  .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .toast-enter { transform: translateY(10px); opacity: 0; }
  .toast-show { transform: translateY(0); opacity: 1; transition: all .25s ease; }
  .toast-leave { transform: translateY(10px); opacity: 0; transition: all .25s ease; }

<body class="min-h-screen">

<header class="bg-white/80 backdrop-blur border-b border-ink-100 sticky top-0 z-30">

</header>

      <p id="groupDesc" class="text-sm text-ink-500 mt-0.5"></p>

    <div id="resultCount" class="text-xs font-bold text-ink-500"></div>

  <div id="empty" class="hidden rounded-xl border border-dashed border-ink-300 bg-white/40 py-16 text-center text-sm text-ink-500">لا توجد نتائج</div>

let activeGroupId = "tatsh";
let activeFilterId = "approved";
let query = "";

const tabsEl = document.getElementById("tabs");
const subtabsEl = document.getElementById("subtabs");
const gridEl = document.getElementById("grid");
const emptyEl = document.getElementById("empty");
const groupTitleEl = document.getElementById("groupTitle");
const groupDescEl = document.getElementById("groupDesc");
const searchInput = document.getElementById("searchInput");
const resultCountEl = document.getElementById("resultCount");
const noteModal = document.getElementById("noteModal");
const noteTitle = document.getElementById("noteTitle");
const noteContent = document.getElementById("noteContent");
const closeNoteBtn = document.getElementById("closeNoteBtn");

// User Menu
const userMenuBtn = document.getElementById("userMenuBtn");
const dropdownMenu = document.getElementById("dropdownMenu");
const logoutBtn = document.getElementById("logoutBtn");
const welcomeText = document.getElementById("welcomeText");
const displayName = document.getElementById("displayName");
const userType = document.getElementById("userType");
const userInitial = document.getElementById("userInitial");

// Initialize user info
function initializeUserInfo() {
  const prefix = currentUser.type === "Medical" ? "Dr." : "Mr.";
  const greeting = `أهلاً وسهلاً، ${prefix} ${currentUser.name}`;
  
  welcomeText.textContent = greeting;
  displayName.textContent = `${prefix} ${currentUser.name}`;
  userType.textContent = currentUser.type === "Medical" ? "طبي" : "إداري";
  userInitial.textContent = currentUser.name.charAt(0).toUpperCase();
}

userMenuBtn.addEventListener("click", () => {
  dropdownMenu.classList.toggle("hidden");
});

document.addEventListener("click", (e) => {
  if (!userMenuBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
    dropdownMenu.classList.add("hidden");
  }
});

logoutBtn.addEventListener("click", () => {
  sessionStorage.removeItem("user");
  window.location.href = "index.html";
});

function getActiveGroup() {
  return GROUPS.find(g => g.id === activeGroupId) || GROUPS[0];
}

function canAccessGroup(group) {
  if (!group.restrictedTo) return true;
  return group.restrictedTo.includes(currentUser.type);
}

function renderTabs() {
  tabsEl.innerHTML = "";
  GROUPS.filter(g => canAccessGroup(g)).forEach(g => {
    const isActive = g.id === activeGroupId;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = isActive 
      ? "inline-flex items-center gap-2 rounded-full border px-4 py-2 text-sm font-medium bg-brand-600 border-brand-600 text-white shadow-card transition-all hover:shadow-cardHover" 
      : "inline-flex items-center gap-2 rounded-full border px-4 py-2 text-sm font-medium bg-white border-ink-300 text-ink-700 hover:border-brand-500 transition-all";
    btn.innerHTML = `<span>${g.title}</span><span class="rounded-full px-1.5 text-xs ${isActive ? 'bg-white/20 text-white' : 'bg-ink-100 text-ink-500'}">${g.items.length}</span>`;
    btn.addEventListener("click", () => {
      activeGroupId = g.id;
      activeFilterId = g.filters?.[0]?.id || "all";
      query = "";
      searchInput.value = "";
      renderAll();
    });
    tabsEl.appendChild(btn);
  });
}

function renderSubtabs() {
  const group = getActiveGroup();
  subtabsEl.innerHTML = "";
  
  if (!group.filters) {
    return;
  }
  
  group.filters.forEach(filter => {
    const count = group.items.filter(item => item.filter === filter.id).length;
    const isActive = activeFilterId === filter.id;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = isActive
      ? "inline-flex items-center gap-2 rounded-lg border px-3 py-1.5 text-xs font-bold bg-ink-900 border-ink-900 text-white transition-all hover:shadow-card"
      : "inline-flex items-center gap-2 rounded-lg border px-3 py-1.5 text-xs font-bold bg-white border-ink-100 text-ink-500 hover:border-brand-500 hover:text-ink-900 transition-all";
    btn.innerHTML = `<span>${filter.title}</span><span class="opacity-70">${count}</span>`;
    btn.addEventListener("click", () => {
      activeFilterId = filter.id;
      renderAll();
    });
    subtabsEl.appendChild(btn);
  });
}

  const badges = {
    email: { icon: '<svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>', label: "بريد", color: "bg-warn-50 text-warn-500" },
    link: { icon: '<svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>', label: "رابط", color: "bg-brand-50 text-brand-700" },

    text: { icon: '<svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>', label: "نص", color: "bg-success-50 text-success-600" },

function renderGrid() {
  const group = getActiveGroup();
  groupTitleEl.textContent = group.title;
  groupDescEl.textContent = group.description || "";

  const q = query.trim().toLowerCase();
  const items = group.items.filter(item => {
    const filterOk = !group.filters || activeFilterId === "all" || item.filter === activeFilterId;
    const queryOk = !q || JSON.stringify(item).toLowerCase().includes(q);
    return filterOk && queryOk;
  });

  resultCountEl.textContent = `${items.length} عنصر`;
  gridEl.innerHTML = "";

  if (items.length === 0) {
    emptyEl.classList.remove("hidden");
    return;
  }
  emptyEl.classList.add("hidden");

  items.forEach((item) => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "group relative flex h-full flex-col rounded-xl border border-ink-100 bg-white p-5 text-start shadow-card transition-all hover:-translate-y-0.5 hover:shadow-cardHover hover:border-brand-500/40 cursor-pointer";
    
    let preview = "";
    if (item.type === "text") preview = item.text || "";
    else if (item.type === "note") preview = item.text || "";
    else if (item.type === "email") preview = item.description || `إلى: ${item.to}`;
    else if (item.type === "link") preview = item.description || item.href;
    else if (item.type === "file") preview = item.description || item.href;
    else if (item.type === "folder") preview = item.description || item.path;
    
    const detail = item.href || item.path || "";
    
    card.innerHTML = `
      <div class="flex items-center justify-between gap-2 mb-2">
        <h3 class="text-sm font-bold leading-tight text-ink-900">${item.title}</h3>
        ${typeBadge(item.type)}
      </div>
      <p class="line-clamp-3 whitespace-pre-line text-sm leading-relaxed text-ink-500">${preview}</p>
      ${detail ? `<p class="mt-4 truncate rounded-lg bg-ink-50 px-2.5 py-2 text-xs font-medium text-ink-500" dir="ltr">${detail}</p>` : ""}
    `;
    
    card.addEventListener("click", () => handleAction(item, card));
    gridEl.appendChild(card);
  });
}

function renderAll() {
  renderTabs();
  renderSubtabs();
  renderGrid();
}

function openNoteModal(title, content) {
  noteTitle.textContent = title;
  noteContent.textContent = content;
  noteModal.classList.remove("hidden");
  noteModal.classList.add("flex");
}

function closeNoteModal() {
  noteModal.classList.add("hidden");
  noteModal.classList.remove("flex");
}

async function handleAction(item, cardEl) {
  if (item.type === "text") {
    const ok = await copyToClipboard(item.text || "");
    if (ok) {
      flashCard(cardEl, "success");
      toast({ title: "تم النسخ", desc: item.title, kind: "success" });
    }
    return;
  }

  if (item.type === "note") {
    openNoteModal(item.title, item.text || "");
    flashCard(cardEl, "info");
    return;
  }

  if (item.type === "email") {
    const url = buildMailto(item);
    window.location.href = url;
    flashCard(cardEl, "info");
    toast({ title: "جارٍ فتح البريد", desc: item.title, kind: "info" });
    return;
  }

  if (item.type === "link") {
    window.open(item.href, "_blank");
    flashCard(cardEl, "info");
    toast({ title: "تم فتح الرابط", desc: item.title, kind: "info" });
    return;
  }

  if (item.type === "file") {
    window.open(item.href, "_blank");
    flashCard(cardEl, "info");
    toast({ title: "جارٍ فتح الملف", desc: item.title, kind: "info" });
    return;
  }

  if (item.type === "folder") {
    const ok = await copyToClipboard(item.path || "");
    if (ok) {
      flashCard(cardEl, "success");
      toast({ title: "تم نسخ مسار المجلد", desc: "الصقه في File Explorer", kind: "success" });
    }
  }
}

function buildMailto({ to = "", cc = "", subject = "", body = "" }) {
  const params = [];
  if (cc) params.push("cc=" + encodeURIComponent(cc));
  if (subject) params.push("subject=" + encodeURIComponent(subject));
  if (body) params.push("body=" + encodeURIComponent(body));
  return "mailto:" + encodeURIComponent(to).replace(/%40/g, "@") + (params.length ? "?" + params.join("&") : "");
}

async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (_) {}
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch (_) {
    return false;
  }
}

function flashCard(el, kind) {
  const cls = kind === "success" ? "card-flash-success" : "card-flash-info";
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), 1200);
}

function toast({ title, desc = "", kind = "success" }) {
  const wrap = document.getElementById("toasts");
  const colors = { success: "border-success-500/30 bg-white", info: "border-brand-500/30 bg-white", error: "border-red-300 bg-white" };
  const dot = { success: "bg-success-500", info: "bg-brand-600", error: "bg-red-500" };

  const el = document.createElement("div");
  el.className = `toast-enter min-w-[240px] max-w-[340px] rounded-lg border ${colors[kind]} shadow-cardHover px-4 py-3 flex items-start gap-3`;
  el.innerHTML = `
    <span class="mt-1.5 inline-block h-2 w-2 rounded-full ${dot[kind]}"></span>
    <div class="flex-1">
      <div class="text-sm font-bold text-ink-900">${title}</div>
      ${desc ? `<div class="text-xs text-ink-500 mt-0.5">${desc}</div>` : ""}
    </div>
  `;
  wrap.appendChild(el);
  requestAnimationFrame(() => {
    el.classList.remove("toast-enter");
    el.classList.add("toast-show");
  });
  setTimeout(() => {
    el.classList.remove("toast-show");
    el.classList.add("toast-leave");
    setTimeout(() => el.remove(), 250);
  }, 1800);
}

searchInput.addEventListener("input", (e) => {
  query = e.target.value;
  renderGrid();
});

closeNoteBtn.addEventListener("click", closeNoteModal);
noteModal.addEventListener("click", (e) => {
  if (e.target === noteModal) closeNoteModal();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeNoteModal();
});

// Initialize
initializeUserInfo();
renderAll();
